services:
  postgres:
    image: postgres:18-alpine
    container_name: daily-rewards-db
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
      POSTGRES_DB: ${DB_NAME:-app}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - daily_rewards_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: daily-rewards-api
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER:-app}:${DB_PASSWORD:-app}@postgres:5432/${DB_NAME:-app}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      CYCLE_BEHAVIOR: ${CYCLE_BEHAVIOR:-reset}
      REWARD_COOLDOWN_SEC: ${REWARD_COOLDOWN_SEC:-300}
      REWARD_STREAK_RESET_SEC: ${REWARD_STREAK_RESET_SEC:-600}
    restart: unless-stopped

volumes:
  daily_rewards_pg:
